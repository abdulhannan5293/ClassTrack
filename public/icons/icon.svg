<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cap-grad" x1="256" y1="140" x2="256" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="90" r="60" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="430" r="45" fill="rgba(255,255,255,0.06)"/>
  <circle cx="460" cy="400" r="30" fill="rgba(255,255,255,0.05)"/>

  <!-- Graduation cap board (diamond) -->
  <polygon points="256,160 380,230 256,300 132,230" fill="url(#cap-grad)" opacity="0.95"/>
  <polygon points="256,160 380,230 256,300 132,230" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Tassel string -->
  <path d="M 320 230 Q 340 290 330 340" stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.9"/>

  <!-- Tassel end -->
  <line x1="330" y1="340" x2="322" y2="375" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="330" y1="340" x2="330" y2="378" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="330" y1="340" x2="338" y2="375" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Cap button -->
  <circle cx="256" cy="230" r="8" fill="#d97706" stroke="#ffffff" stroke-width="2"/>

  <!-- Cap thickness (side of board) -->
  <polygon points="132,230 256,300 256,320 132,250" fill="rgba(255,255,255,0.6)"/>
  <polygon points="380,230 256,300 256,320 380,250" fill="rgba(255,255,255,0.4)"/>

  <!-- Text: CT -->
  <text x="256" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="#ffffff" letter-spacing="-2">CT</text>
</svg>
